<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEAR Contract Compiler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .content {
            padding: 30px;
        }

        .editor-section {
            margin-bottom: 30px;
        }

        .editor-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #contractCode {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        #contractCode:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #compileBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #compileBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #compileBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #deployBtn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        #deployBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        #deployBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #clearBtn {
            background: #f5f5f5;
            color: #666;
        }

        #clearBtn:hover {
            background: #e0e0e0;
        }

        .result-section {
            margin-top: 30px;
        }

        .result-box {
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-box.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
        }

        .result-box.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
        }

        .result-box h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .result-box p {
            margin: 5px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .example-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .example-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .example-btn {
            padding: 8px 16px;
            margin: 5px 5px 5px 0;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.3s;
        }

        .example-btn:hover {
            background: #5568d3;
        }

        .language-selector {
            margin-bottom: 20px;
        }

        .language-selector label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .language-tabs {
            display: flex;
            gap: 10px;
            background: #f5f5f5;
            padding: 5px;
            border-radius: 8px;
        }

        .language-tab {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            color: #666;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            text-transform: none;
            letter-spacing: normal;
        }

        .language-tab:hover {
            background: #e0e0e0;
        }

        .language-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 NEAR Contract Compiler</h1>
            <p>Write and compile JavaScript and Rust NEAR smart contracts</p>
        </div>

        <div class="content">
            <div class="language-selector">
                <label>Select Language</label>
                <div class="language-tabs">
                    <button class="language-tab active" onclick="selectLanguage('JavaScript')">JavaScript</button>
                    <button class="language-tab" onclick="selectLanguage('Rust')">Rust</button>
                </div>
            </div>

            <div class="editor-section">
                <label for="contractCode">Contract Code (<span id="currentLanguage">JavaScript</span>)</label>
                <textarea id="contractCode" placeholder="Write your NEAR contract code here..."></textarea>
            </div>

            <div class="button-group">
                <button id="compileBtn" onclick="compileContract()">Compile Contract</button>
                <button id="deployBtn" onclick="deployContract()" disabled>Deploy Contract</button>
                <button id="clearBtn" onclick="clearEditor()">Clear</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Compiling contract... Please wait.</p>
            </div>

            <div class="result-section">
                <div id="resultBox" class="result-box"></div>
            </div>

            <div class="example-section">
                <h3>📝 Example Contracts</h3>
                <div id="exampleButtons"></div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:3001';
        let currentLanguage = 'JavaScript';
        let compiledWasm = null;

        const examples = {
            JavaScript: {
                counter: `import { NearBindgen, view, call } from "near-sdk-js";

@NearBindgen({})
class CounterContract {
  count = 0;

  @view({})
  get_count() {
    return this.count;
  }

  @call({})
  increment() {
    this.count += 1;
    near.log(\`Count is now: \${this.count}\`);
  }

  @call({})
  decrement() {
    this.count -= 1;
    near.log(\`Count is now: \${this.count}\`);
  }

  @call({})
  reset() {
    this.count = 0;
    near.log("Count reset to 0");
  }
}`,

                greeting: `import { NearBindgen, view, call } from "near-sdk-js";

@NearBindgen({})
class GreetingContract {
  greeting = "Hello";

  @view({})
  get_greeting() {
    return this.greeting;
  }

  @call({})
  set_greeting({ message }) {
    this.greeting = message;
    near.log(\`Greeting set to: \${message}\`);
  }
}`,

                storage: `import { NearBindgen, view, call } from "near-sdk-js";

@NearBindgen({})
class StorageContract {
  data = {};

  @view({})
  get({ key }) {
    return this.data[key] || null;
  }

  @call({})
  set({ key, value }) {
    this.data[key] = value;
    near.log(\`Set \${key} = \${value}\`);
  }

  @call({})
  remove({ key }) {
    delete this.data[key];
    near.log(\`Removed \${key}\`);
  }

  @view({})
  list() {
    return Object.keys(this.data);
  }
}`,

                hello_world: `import { NearBindgen, view } from "near-sdk-js";

@NearBindgen({})
class HelloWorldContract {
  @view({})
  hello_world() {
    return "Hello, NEAR!";
  }
}`
            },

            Rust: {
                counter: `use near_sdk::borsh::{self, BorshDeserialize, BorshSerialize};
use near_sdk::{log, near_bindgen};

#[near_bindgen]
#[derive(BorshDeserialize, BorshSerialize, Default)]
pub struct CounterContract {
    count: i32,
}

#[near_bindgen]
impl CounterContract {
    pub fn get_count(&self) -> i32 {
        self.count
    }

    pub fn increment(&mut self) {
        self.count += 1;
        log!("Count is now: {}", self.count);
    }

    pub fn decrement(&mut self) {
        self.count -= 1;
        log!("Count is now: {}", self.count);
    }

    pub fn reset(&mut self) {
        self.count = 0;
        log!("Count reset to 0");
    }
}`,

                greeting: `use near_sdk::borsh::{self, BorshDeserialize, BorshSerialize};
use near_sdk::{log, near_bindgen};

#[near_bindgen]
#[derive(BorshDeserialize, BorshSerialize)]
pub struct GreetingContract {
    greeting: String,
}

impl Default for GreetingContract {
    fn default() -> Self {
        Self {
            greeting: "Hello".to_string(),
        }
    }
}

#[near_bindgen]
impl GreetingContract {
    pub fn get_greeting(&self) -> String {
        self.greeting.clone()
    }

    pub fn set_greeting(&mut self, message: String) {
        self.greeting = message.clone();
        log!("Greeting set to: {}", message);
    }
}`,

                storage: `use near_sdk::borsh::{self, BorshDeserialize, BorshSerialize};
use near_sdk::collections::UnorderedMap;
use near_sdk::{log, near_bindgen, env};

#[near_bindgen]
#[derive(BorshDeserialize, BorshSerialize)]
pub struct StorageContract {
    data: UnorderedMap<String, String>,
}

impl Default for StorageContract {
    fn default() -> Self {
        Self {
            data: UnorderedMap::new(b"d"),
        }
    }
}

#[near_bindgen]
impl StorageContract {
    pub fn get(&self, key: String) -> Option<String> {
        self.data.get(&key)
    }

    pub fn set(&mut self, key: String, value: String) {
        self.data.insert(&key, &value);
        log!("Set {} = {}", key, value);
    }

    pub fn remove(&mut self, key: String) {
        self.data.remove(&key);
        log!("Removed {}", key);
    }

    pub fn list(&self) -> Vec<String> {
        self.data.keys().collect()
    }
}`,

                hello_world: `use near_sdk::borsh::{self, BorshDeserialize, BorshSerialize};
use near_sdk::near_bindgen;

#[near_bindgen]
#[derive(BorshDeserialize, BorshSerialize, Default)]
pub struct HelloWorldContract {}

#[near_bindgen]
impl HelloWorldContract {
    pub fn hello_world(&self) -> String {
        "Hello, NEAR!".to_string()
    }
}`
            }
        };

        function selectLanguage(language) {
            currentLanguage = language;
            
            // Update active tab
            document.querySelectorAll('.language-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update label
            document.getElementById('currentLanguage').textContent = language;
            
            // Clear editor and result
            clearEditor();
            
            // Update example buttons
            updateExampleButtons();
            
            // Load first example for the language
            const exampleNames = Object.keys(examples[language]);
            if (exampleNames.length > 0) {
                loadExample(exampleNames[0]);
            }
        }

        function updateExampleButtons() {
            const exampleButtons = document.getElementById('exampleButtons');
            const languageExamples = examples[currentLanguage];
            
            exampleButtons.innerHTML = '';
            
            for (const [name, code] of Object.entries(languageExamples)) {
                const btn = document.createElement('button');
                btn.className = 'example-btn';
                btn.textContent = name.split('_').map(word => 
                    word.charAt(0).toUpperCase() + word.slice(1)
                ).join(' ') + ' Contract';
                btn.onclick = () => loadExample(name);
                exampleButtons.appendChild(btn);
            }
        }

        function loadExample(name) {
            const code = examples[currentLanguage][name];
            if (code) {
                document.getElementById('contractCode').value = code;
                compiledWasm = null;
                document.getElementById('deployBtn').disabled = true;
                hideResult();
            }
        }

        function clearEditor() {
            document.getElementById('contractCode').value = '';
            compiledWasm = null;
            document.getElementById('deployBtn').disabled = true;
            hideResult();
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
            document.getElementById('compileBtn').disabled = true;
            hideResult();
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('compileBtn').disabled = false;
        }

        function showResult(success, message, details = {}) {
            const resultBox = document.getElementById('resultBox');
            resultBox.className = `result-box ${success ? 'success' : 'error'}`;
            resultBox.classList.add('show');

            let html = `<h3>${success ? '✅ Success!' : '❌ Error'}</h3>`;
            html += `<p><strong>${message}</strong></p>`;

            if (success && details.size) {
                html += `<p>WASM Size: ${details.size.toLocaleString()} bytes</p>`;
                html += `<p>Compilation Time: ${details.compilation_time || 'N/A'}</p>`;
            }

            if (!success && details.error) {
                html += `<p style="margin-top: 10px; white-space: pre-wrap; font-size: 0.85rem;">${details.error}</p>`;
            }

            resultBox.innerHTML = html;
        }

        function hideResult() {
            document.getElementById('resultBox').classList.remove('show');
        }

        async function compileContract() {
            const code = document.getElementById('contractCode').value.trim();

            if (!code) {
                showResult(false, 'Please enter contract code');
                return;
            }

            showLoading();

            try {
                const response = await fetch(`${BACKEND_URL}/api/compile`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        code: code,
                        language: currentLanguage
                    })
                });

                const data = await response.json();

                hideLoading();

                if (response.ok && data.success) {
                    let compilationTime = data.compilation_time;
                    if (typeof compilationTime === 'number') {
                        compilationTime = `${compilationTime.toFixed(2)}s`;
                    }
                    
                    // Store compiled WASM for deployment
                    compiledWasm = data.wasm;
                    document.getElementById('deployBtn').disabled = false;
                    
                    showResult(true, 'Contract compiled successfully!', {
                        size: data.size,
                        compilation_time: compilationTime
                    });
                } else {
                    const errorMessage = data.stderr || data.message || data.error || 'Unknown error';
                    compiledWasm = null;
                    document.getElementById('deployBtn').disabled = true;
                    showResult(false, 'Compilation failed', {
                        error: errorMessage
                    });
                }
            } catch (error) {
                hideLoading();
                compiledWasm = null;
                document.getElementById('deployBtn').disabled = true;
                showResult(false, 'Failed to connect to backend', {
                    error: error.message || 'Make sure the backend server is running on http://localhost:3001'
                });
            }
        }

        async function deployContract() {
            if (!compiledWasm) {
                showResult(false, 'No compiled contract to deploy. Please compile first.');
                return;
            }

            const contractAccountId = prompt('Enter contract account ID (leave empty to use your account):');
            if (contractAccountId === null) {
                return; // User cancelled
            }

            showLoading();
            document.getElementById('loading').querySelector('p').textContent = 'Deploying contract... Please wait.';
            document.getElementById('deployBtn').disabled = true;

            try {
                const response = await fetch(`${BACKEND_URL}/api/deploy`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        wasmBase64: compiledWasm,
                        contractAccountId: contractAccountId || undefined,
                        initMethod: 'new',
                        initArgs: {}
                    })
                });

                const data = await response.json();

                hideLoading();
                document.getElementById('loading').querySelector('p').textContent = 'Compiling contract... Please wait.';

                if (response.ok && data.success) {
                    let html = `<h3>✅ Deployment Successful!</h3>`;
                    html += `<p><strong>Contract deployed to: ${data.contractId}</strong></p>`;
                    if (data.transactionHash) {
                        html += `<p>Transaction: ${data.transactionHash}</p>`;
                    }
                    if (data.explorerUrl) {
                        html += `<p><a href="${data.explorerUrl}" target="_blank" style="color: #667eea;">View in Explorer</a></p>`;
                    }
                    if (data.accountUrl) {
                        html += `<p><a href="${data.accountUrl}" target="_blank" style="color: #667eea;">View Account</a></p>`;
                    }
                    html += `<p>Deployment Time: ${data.deploymentTime?.toFixed(2)}s</p>`;
                    
                    const resultBox = document.getElementById('resultBox');
                    resultBox.className = 'result-box success show';
                    resultBox.innerHTML = html;
                } else {
                    showResult(false, 'Deployment failed', {
                        error: data.error || 'Unknown error'
                    });
                }

                // Re-enable deploy button
                document.getElementById('deployBtn').disabled = false;

            } catch (error) {
                hideLoading();
                document.getElementById('loading').querySelector('p').textContent = 'Compiling contract... Please wait.';
                document.getElementById('deployBtn').disabled = false;
                showResult(false, 'Failed to connect to backend', {
                    error: error.message || 'Make sure the backend server is running on http://localhost:3001'
                });
            }
        }

        // Allow Ctrl+Enter to compile
        document.getElementById('contractCode').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                compileContract();
            }
        });

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            updateExampleButtons();
            loadExample('counter');
        });
    </script>
</body>
</html>
