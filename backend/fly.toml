# fly.toml - Fly.io configuration for NEAR Backend
# Deploy with: fly deploy

app = 'learn-near-backend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3001'
  NEAR_NETWORK = 'testnet'
  # Increased Node memory to reduce swap during JS compilation (clang + copy)
  NODE_OPTIONS = '--max-old-space-size=2048'

# Persistent storage for compiled contract cache
[mounts]
  source = 'near_builds_cache'
  destination = '/app/persistent-builds'
  initial_size = '3gb'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    # Limit concurrent requests to prevent multiple compilations at once
    hard_limit = 10
    soft_limit = 5

  # Health check - increased grace period for cold starts
  [[http_service.checks]]
    interval = '30s'
    timeout = '15s'
    grace_period = '120s'
    method = 'GET'
    path = '/api/health'

# Dedicated CPU for consistent compile performance (avoids shared-CPU throttling)
[[vm]]
  size = 'performance-4x'
  memory = '8gb'
  cpus = 4
  cpu_kind = 'performance'
